name: Sync profile README

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "dist/**"
      - ".github/workflows/sync-profile-readme.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PROFILE_SYNC_TOKEN: ${{ secrets.PROFILE_SYNC_TOKEN }}
    steps:
      - name: Skip when token missing
        if: ${{ env.PROFILE_SYNC_TOKEN == '' }}
        run: |
          echo "PROFILE_SYNC_TOKEN is not set; skipping profile sync."

      - name: Checkout source repo
        if: ${{ env.PROFILE_SYNC_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout profile repo
        if: ${{ env.PROFILE_SYNC_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: stuchain/stuchain
          token: ${{ env.PROFILE_SYNC_TOKEN }}
          path: profile

      - name: Sync README and snake assets
        if: ${{ env.PROFILE_SYNC_TOKEN != '' }}
        run: |
          cp source/README.md profile/README.md
          mkdir -p profile/dist
          cp source/dist/github-snake.svg profile/dist/github-snake.svg
          cp source/dist/github-snake-dark.svg profile/dist/github-snake-dark.svg

      - name: Commit and push when changed
        if: ${{ env.PROFILE_SYNC_TOKEN != '' }}
        run: |
          cd profile
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md dist/github-snake.svg dist/github-snake-dark.svg
          if git diff --cached --quiet; then
            echo "No profile sync changes."
            exit 0
          fi
          git commit -m "docs: sync profile README from stuchain/readme"
          git push
