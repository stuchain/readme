name: Generate contribution snake

on:
  push:
    branches:
      - main
    paths-ignore:
      - "dist/**"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: snake-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Blue / periwinkle / violet — aligned with github-readme-activity-graph (tokyo-night) above the snake.
          # color_dots: empty → busiest (5 levels). color_snake: head color.
          outputs: |
            dist/github-snake.svg?color_dots=%23f8fafc,%23e0e7ff,%23c7d2fe,%23a5b4fc,%23818cf8&color_snake=%237a95f5
            dist/github-snake-dark.svg?color_dots=%231a1b27,%233d4f73,%23565f89,%237aa2f7,%23bb9af7&color_snake=%237aa2f7

      - name: Commit snake assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update contribution snake"
          file_pattern: "dist/*.svg"
