name: Latest blog posts

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: readme-content-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README with latest posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull RSS feeds into README
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          # Replace with your RSS URLs (comma-separated). Example: https://yourblog.com/feed/,https://dev.to/feed/username
          feed_list: "https://hnrss.org/frontpage"
          max_post_count: "5"
          readme_path: "./README.md"
          commit_message: "docs: update latest posts in README"
